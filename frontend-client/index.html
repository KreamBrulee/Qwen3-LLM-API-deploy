<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qwen Web Client</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>Qwen Web Client</h1>
      <p>Simple browser client for your deployed proxy API.</p>
    </header>

    <section class="card">
      <h2>Connection</h2>
      <label for="apiBase">API Base URL</label>
      <input id="apiBase" type="text" value="https://your-domain" placeholder="https://llm-api.example.com" />

      <label for="apiKey">API Key</label>
      <input id="apiKey" type="password" placeholder="Paste your Bearer token" />

      <label for="model">Model</label>
      <input id="model" type="text" value="qwen3-14b-q4_k_m" />

      <div class="actions">
        <button id="healthBtn" type="button">Check Health</button>
        <button id="modelsBtn" type="button">List Models</button>
      </div>
      <pre id="metaOutput" class="output small"></pre>
    </section>

    <section class="card">
      <h2>Chat</h2>
      <label for="systemPrompt">System Prompt</label>
      <textarea id="systemPrompt" rows="3" placeholder="Optional system instructions">You are a helpful assistant.</textarea>

      <label for="userPrompt">User Prompt</label>
      <textarea id="userPrompt" rows="6" placeholder="Type your question..."></textarea>

      <label for="maxTokens">Max Tokens</label>
      <input id="maxTokens" type="number" min="1" max="1024" value="300" />

      <label for="temperature">Temperature</label>
      <input id="temperature" type="number" min="0" max="2" step="0.1" value="0.7" />

      <div class="actions">
        <button id="sendBtn" type="button">Send</button>
      </div>

      <h3>Assistant Response</h3>
      <pre id="chatOutput" class="output"></pre>
    </section>
  </main>

  <script src="./app.js" defer></script>
</body>
</html>
